name: Deploy Interiq

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |

            set -e

            echo "Starting deployment"

            # Load Node environment (important for npm/pm2)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "Node version:"
            node -v
            npm -v

            cd ~/ILS

            echo "Pull latest code"
            git pull origin main

            echo "Deploy backend"
            cd backend
            npm install
            pm2 restart interiq-backend || pm2 start server.js --name interiq-backend

            echo "Deploy client"
            cd ../interiq-client
            npm install
            npm run build
            rm -rf /var/www/interiq-client/*
            cp -r dist/* /var/www/interiq-client/

            echo "Deploy admin"
            cd ../interiq-admin
            npm install
            npm run build
            rm -rf /var/www/interiq-admin/*
            cp -r dist/* /var/www/interiq-admin/

            echo "Reload nginx"
            systemctl reload nginx

            echo "Deployment finished"